version: "3.9"

# =============================================================================
# KYC Monaco — Self-hosted stack for XEFI Cloud
# Run: docker compose up -d
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 — replaces Supabase hosted DB
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: kycmonaco
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-c7p5XQ3v6!!}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations/00001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Supabase Auth (GoTrue) — handles JWT, signup, login
  # -------------------------------------------------------------------------
  supabase-auth:
    image: supabase/gotrue:v2.170.0
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${DB_PASSWORD:-c7p5XQ3v6!!}@postgres:5432/kycmonaco?sslmode=disable
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL:-http://localhost:3000}/**
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-min-32-chars}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
    ports:
      - "9999:9999"

  # -------------------------------------------------------------------------
  # Supabase REST API (PostgREST) — auto-generates REST from PostgreSQL
  # -------------------------------------------------------------------------
  supabase-rest:
    image: postgrest/postgrest:v12.2.12
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${DB_PASSWORD:-c7p5XQ3v6!!}@postgres:5432/kycmonaco
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production-min-32-chars}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "3001:3000"

  # -------------------------------------------------------------------------
  # MinIO — S3-compatible storage for documents
  # -------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-kycmonaco}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-kycmonaco2026}
    volumes:
      - storage-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # -------------------------------------------------------------------------
  # Next.js App — KYC Monaco
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - postgres
      - supabase-auth
      - supabase-rest
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://supabase-rest:3000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.placeholder}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-c7p5XQ3v6!!}@postgres:5432/kycmonaco
    ports:
      - "3000:3000"

  # -------------------------------------------------------------------------
  # Nginx — Reverse proxy + SSL termination
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
      - supabase-auth
      - supabase-rest
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"

volumes:
  db-data:
  storage-data:
